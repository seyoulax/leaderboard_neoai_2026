services:
  backend:
    build:
      context: ./backend
    container_name: neoai-lb-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data/tasks.json:/app/data/tasks.json
      - ./backend/data/boards.json:/app/data/boards.json
      - ./backend/data/participants.json:/app/data/participants.json
      - /home/student-dash/.kaggle:/root/.kaggle:ro
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: neoai-lb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80"
