<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Лидерборд — NeoAI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', Arial, sans-serif;
      color: #fff;
    }

    .overlay {
      position: relative;
      width: 1920px;
      height: 1080px;
    }

    /* ── Main panel ── */
    .panel {
      position: absolute;
      right: 40px;
      top: 40px;
      bottom: 40px;
      width: 680px;
      background: linear-gradient(160deg, #2d1656 0%, #1a0a3e 40%, #120730 100%);
      border: 2px solid;
      border-color: #b8860b;
      border-radius: 24px;
      padding: 0;
      box-shadow:
        0 0 40px rgba(100, 40, 200, 0.4),
        0 0 80px rgba(60, 20, 120, 0.2),
        inset 0 0 60px rgba(80, 30, 160, 0.15);
      opacity: 0;
      transform: translateY(30px);
      animation: panelIn 0.6s ease-out forwards;
      overflow: hidden;
    }

    /* Purple diagonal light streaks */
    .panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(180, 100, 255, 0.08) 0%, transparent 40%),
        linear-gradient(225deg, rgba(180, 100, 255, 0.06) 0%, transparent 35%),
        linear-gradient(315deg, rgba(120, 60, 200, 0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .panel-inner {
      position: relative;
      z-index: 1;
      padding: 32px 28px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    @keyframes panelIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Title ── */
    .title {
      text-align: center;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeIn 0.4s 0.2s ease-out forwards;
    }

    .title-trophies {
      font-size: 36px;
      margin-bottom: 4px;
    }

    .title-name {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffd700 0%, #ffaa00 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    .title-sub {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 4px;
    }

    /* ── Table header ── */
    .table-header {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      margin: 16px 0 8px;
      background: linear-gradient(90deg, rgba(160, 80, 255, 0.35) 0%, rgba(100, 40, 200, 0.2) 100%);
      border-top: 1px solid rgba(255, 215, 0, 0.3);
      border-bottom: 1px solid rgba(255, 215, 0, 0.3);
      opacity: 0;
      animation: fadeIn 0.4s 0.3s ease-out forwards;
    }

    .table-header span {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.6);
    }

    .col-rank { width: 80px; text-align: center; }
    .col-name { flex: 1; }
    .col-score { width: 100px; text-align: right; }

    /* ── Rows ── */
    .rows {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      opacity: 0;
      animation: fadeIn 0.4s 0.4s ease-out forwards;
    }

    .row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: linear-gradient(90deg, rgba(120, 50, 200, 0.25) 0%, rgba(80, 30, 160, 0.15) 100%);
      border: 1px solid rgba(160, 100, 255, 0.12);
      border-radius: 8px;
      opacity: 0;
      transform: translateX(-20px);
      transition: background 0.2s;
    }

    .row:hover {
      background: linear-gradient(90deg, rgba(140, 60, 220, 0.35) 0%, rgba(100, 40, 180, 0.25) 100%);
    }

    /* ── Rank diamond ── */
    .rank-diamond {
      width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .diamond {
      width: 36px;
      height: 36px;
      transform: rotate(45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(160, 100, 255, 0.4);
      background: linear-gradient(135deg, rgba(80, 30, 160, 0.6) 0%, rgba(40, 15, 80, 0.8) 100%);
      flex-shrink: 0;
    }

    .diamond-text {
      transform: rotate(-45deg);
      font-size: 13px;
      font-weight: 800;
      color: #fff;
    }

    .diamond-1 {
      border-color: #ffd700;
      background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(180, 130, 0, 0.4) 100%);
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
    }
    .diamond-1 .diamond-text { color: #ffd700; }

    .diamond-2 {
      border-color: #c0c0c0;
      background: linear-gradient(135deg, rgba(192, 192, 192, 0.25) 0%, rgba(120, 120, 120, 0.3) 100%);
      box-shadow: 0 0 10px rgba(192, 192, 192, 0.2);
    }
    .diamond-2 .diamond-text { color: #e0e0e0; }

    .diamond-3 {
      border-color: #cd7f32;
      background: linear-gradient(135deg, rgba(205, 127, 50, 0.25) 0%, rgba(140, 80, 20, 0.3) 100%);
      box-shadow: 0 0 10px rgba(205, 127, 50, 0.2);
    }
    .diamond-3 .diamond-text { color: #e8a050; }

    /* ── Name & Score ── */
    .player-name {
      flex: 1;
      font-size: 18px;
      font-weight: 700;
      padding-left: 8px;
    }

    .player-score {
      width: 100px;
      text-align: right;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 20px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
    }

    /* ── Status bar ── */
    .status {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.25);
      opacity: 0;
      animation: fadeIn 0.4s 0.6s ease-out forwards;
    }

    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeIn { to { opacity: 1; } }

    @keyframes rowIn {
      to { opacity: 1; transform: translateX(0); }
    }

    /* ── Refresh button ── */
    .refresh-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255, 215, 0, 0.25);
      background: rgba(40, 15, 80, 0.8);
      color: #ffd700;
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, background 0.2s;
      z-index: 10;
    }

    .refresh-btn.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .refresh-btn:hover {
      background: rgba(100, 50, 180, 0.6);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="panel">
      <div class="panel-inner">
        <div class="title">
          <div class="title-trophies">🏆 🏆</div>
          <div class="title-name">NeoAI</div>
          <div class="title-sub">Leaderboard</div>
        </div>

        <div class="table-header">
          <span class="col-rank">Rank</span>
          <span class="col-name">Участник</span>
          <span class="col-score">Баллы</span>
        </div>

        <div class="rows" id="rows"></div>

        <div class="status">
          <span><span class="live-dot"></span>Авто-обновление каждые 30с</span>
          <span id="lastUpdate"></span>
        </div>
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Обновить">&#8635;</button>
    </div>
  </div>

  <script>
    const CSV_FILE    = "leaderboard.csv";
    const AUTO_RELOAD = 30000;

    async function loadCSV() {
      try {
        const res = await fetch(CSV_FILE + "?t=" + Date.now());
        const text = await res.text();
        const lines = text.trim().split("\n");
        const data = lines.slice(1)
          .map(line => {
            const parts = line.split(",");
            const score = parseFloat(parts[parts.length - 1]);
            const name = parts.slice(0, -1).join(",").trim();
            return { name, score };
          })
          .filter(d => d.name && !isNaN(d.score))
          .sort((a, b) => b.score - a.score);
        renderRows(data);
      } catch (e) {
        console.error("Failed to load CSV:", e);
      }
    }

    function renderRows(data) {
      const container = document.getElementById("rows");
      container.innerHTML = data.map((row, i) => {
        const rank = i + 1;
        const diamondClass = rank <= 3 ? ` diamond-${rank}` : "";
        const delay = 0.4 + i * 0.1;

        return `<div class="row" style="animation: rowIn 0.4s ${delay}s ease-out forwards;">
          <div class="rank-diamond">
            <div class="diamond${diamondClass}">
              <span class="diamond-text">#${rank}</span>
            </div>
          </div>
          <div class="player-name">${row.name}</div>
          <div class="player-score">${row.score}</div>
        </div>`;
      }).join("");

      document.getElementById("lastUpdate").textContent =
        "Обновлено: " + new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    }

    loadCSV();
    setInterval(loadCSV, AUTO_RELOAD);

    document.getElementById("refreshBtn").addEventListener("click", loadCSV);

    let navTimer = null;
    document.addEventListener("mousemove", () => {
      const btn = document.getElementById("refreshBtn");
      btn.classList.add("visible");
      if (navTimer) clearTimeout(navTimer);
      navTimer = setTimeout(() => btn.classList.remove("visible"), 3000);
    });
  </script>
</body>
</html>
