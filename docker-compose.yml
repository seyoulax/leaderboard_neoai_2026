services:
  backend:
    build:
      context: ./backend
    container_name: neoai-lb-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data/tasks.json:/app/data/tasks.json:ro
      - ${HOME}/.kaggle:/root/.kaggle:ro
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: http://localhost:3001/api
    container_name: neoai-lb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
